name: Download product images to repo
on:
  workflow_dispatch:

jobs:
  download-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download product images from backup
        run: |
          mkdir -p assets/images
          python3 << 'PYEOF'
          import json, urllib.request, os

          # Use the image backup (already in repo)
          with open('_image_backup.json') as f:
              backup = json.load(f)
          
          # Also try img_urls.json if it exists
          extra = {}
          if os.path.exists('img_urls.json'):
              with open('img_urls.json') as f:
                  data = json.load(f)
              extra.update(data.get('working', {}))
              extra.update(data.get('broken', {}))

          images = backup['images']  # {id: [url, ...]}
          print(f"Backup images: {len(images)}, Extra: {len(extra)}")

          ok, fail = [], []

          def try_download(pid, url):
              if 'source_format=gif' in url or url.endswith('.gif'):
                  ext = 'gif'
              elif 'source_format=png' in url or 'original.png' in url or url.endswith('.png'):
                  ext = 'png'
              elif 'source_format=jpg' in url or url.endswith('.jpg'):
                  ext = 'jpg'
              else:
                  ext = 'webp'
              fname = f'assets/images/{pid}.{ext}'
              req = urllib.request.Request(
                  url, headers={'User-Agent': 'Mozilla/5.0 (compatible)'}
              )
              with urllib.request.urlopen(req, timeout=20) as resp:
                  data = resp.read()
              if len(data) < 200:
                  raise ValueError(f'too small: {len(data)}b')
              with open(fname, 'wb') as f:
                  f.write(data)
              return ext, len(data)

          # Process backup images
          for pid, urls in images.items():
              url = urls[0] if urls else None
              if not url:
                  continue
              try:
                  ext, size = try_download(pid, url)
                  ok.append(f'{pid}.{ext} ({size//1024}KB)')
                  print(f'OK   {pid}')
              except Exception as e:
                  fail.append(f'{pid}: {str(e)[:60]}')
                  print(f'FAIL {pid}: {e}')

          # Process extra (img_urls.json) - new products not in backup
          for pid, url in extra.items():
              if pid in images:
                  continue  # already processed
              if not url:
                  continue
              try:
                  ext, size = try_download(pid, url)
                  ok.append(f'{pid}.{ext} ({size//1024}KB) [new]')
                  print(f'OK   {pid} [new]')
              except Exception as e:
                  fail.append(f'{pid}: {str(e)[:60]}')
                  print(f'FAIL {pid}: {e}')

          print(f'\nSuccess: {len(ok)} | Failed: {len(fail)}')
          if fail:
              print('\nFailed:')
              for f in fail: print(f'  - {f}')
          
          with open('_download_results.json', 'w', encoding='utf-8') as f:
              json.dump({'ok': ok, 'failed': fail}, f, indent=2, ensure_ascii=False)
          PYEOF

      - name: Commit images
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add assets/images/ _download_results.json
          if git diff --staged --quiet; then
            echo "Nothing new to commit"
          else
            COUNT=$(git diff --staged --name-only | grep 'assets/images/' | wc -l || echo 0)
            git commit -m "feat: add ${COUNT} product images (auto-downloaded)"
            git push
          fi
