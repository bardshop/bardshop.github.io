name: Download product images to repo
on:
  workflow_dispatch:

jobs:
  download-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all product images
        run: |
          mkdir -p assets/images
          python3 << 'PYEOF'
          import json, urllib.request, os

          # Read the URL source file
          with open('img_urls.json') as f:
              data = json.load(f)

          # Combine working + broken (try all)
          all_urls = {}
          all_urls.update(data.get('working', {}))
          all_urls.update(data.get('broken', {}))
          print(f"Total products to process: {len(all_urls)}")

          ok, fail = [], []
          for pid, url in all_urls.items():
              if not url:
                  continue
              # Determine extension
              if 'source_format=gif' in url or '.gif' in url:
                  ext = 'gif'
              elif 'source_format=png' in url or 'original.png' in url or '.png' in url:
                  ext = 'png'
              elif 'source_format=jpg' in url or '.jpg' in url:
                  ext = 'jpg'
              else:
                  ext = 'webp'

              fname = f'assets/images/{pid}.{ext}'
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          'User-Agent': 'Mozilla/5.0 (compatible)',
                          'Accept': 'image/webp,image/png,image/*,*/*'
                      }
                  )
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      content = resp.read()
                  if len(content) < 200:
                      fail.append(f'{pid}: too small ({len(content)}b)')
                      print(f'SKIP {pid}: too small ({len(content)}b)')
                      continue
                  with open(fname, 'wb') as f:
                      f.write(content)
                  kb = len(content) // 1024
                  ok.append(f'{pid}.{ext} ({kb}KB)')
                  print(f'OK   {pid}.{ext} ({kb}KB)')
              except Exception as e:
                  fail.append(f'{pid}: {str(e)[:80]}')
                  print(f'FAIL {pid}: {e}')

          print(f'\nSuccess: {len(ok)} | Failed: {len(fail)}')
          if fail:
              print('\nFailed products:')
              for f in fail:
                  print(f'  - {f}')

          # Save results for reference
          with open('_download_results.json', 'w') as f:
              json.dump({'ok': ok, 'failed': fail, 'total': len(all_urls)}, f, indent=2, ensure_ascii=False)
          PYEOF

      - name: Commit images to repo
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add assets/images/ _download_results.json
          if git diff --staged --quiet; then
            echo "Nothing new to commit"
          else
            COUNT=$(git diff --staged --name-only | grep 'assets/images/' | wc -l)
            git commit -m "feat: add ${COUNT} product images to repo (auto-downloaded)"
            git push
          fi
