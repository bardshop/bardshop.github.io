    <linearGradient id="acrylic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b8d4e3" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="620" rx="16" fill="#fafafa"/>
  <text x="400" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#333">鏡面壓克力 印刷方式說明</text>
  <line x1="200" y1="58" x2="600" y2="58" stroke="#e0c08c" stroke-width="2"/>
  <rect x="30" y="76" width="740" height="240" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="30" y="76" width="740" height="36" rx="12" fill="#3a7bd5"/>
  <rect x="30" y="96" width="740" height="16" fill="#3a7bd5"/>
