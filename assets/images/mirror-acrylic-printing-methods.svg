  </g>
  <rect x="30" y="340" width="740" height="260" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="30" y="340" width="740" height="36" rx="12" fill="#d97a3a"/>
  <rect x="30" y="360" width="740" height="16" fill="#d97a3a"/>
  <text x="56" y="364" font-size="16" font-weight="600" fill="#fff">方式 2（預設方案）</text>
  <text x="400" y="364" text-anchor="middle" font-size="16" font-weight="600" fill="#fff">PET 彩白 ＋ 壓克力 ＋ 鏡面膜</text>
  <rect x="120" y="400" width="40" height="150" rx="4" fill="url(#pet)" stroke="#2c5f9e" stroke-width="1.5"/>
  <text x="140" y="460" text-anchor="middle" font-size="11" fill="#fff" transform="rotate(-90 140 460)">印刷 彩+白</text>
  <text x="140" y="562" text-anchor="middle" font-size="13" font-weight="600" fill="#2c5f9e">PET</text>
  <text x="210" y="480" text-anchor="middle" font-size="28" fill="#999">+</text>
  <rect x="255" y="400" width="50" height="150" rx="4" fill="url(#acrylic)" stroke="#88b4cc" stroke-width="1.5"/>
  <text x="280" y="562" text-anchor="middle" font-size="13" font-weight="600" fill="#4a8aa5">壓克力</text>
  <text x="355" y="480" text-anchor="middle" font-size="28" fill="#999">+</text>
  <rect x="395" y="400" width="24" height="150" rx="3" fill="url(#mirror)" stroke="#999" stroke-width="1.5"/>
  <line x1="403" y1="405" x2="403" y2="545" stroke="#ddd" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="411" y1="405" x2="411" y2="545" stroke="#eee" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="407" y="562" text-anchor="middle" font-size="13" font-weight="600" fill="#666">鏡面膜</text>
  <text x="490" y="480" text-anchor="middle" font-size="28" fill="#999">→</text>
  <g transform="translate(540, 400)">
    <rect x="0" y="0" width="40" height="150" rx="4" fill="url(#pet)" stroke="#2c5f9e" stroke-width="1"/>
    <rect x="40" y="0" width="50" height="150" rx="0" fill="url(#acrylic)" stroke="#88b4cc" stroke-width="1"/>
    <rect x="90" y="0" width="16" height="150" rx="3" fill="url(#mirror)" stroke="#999" stroke-width="1"/>
