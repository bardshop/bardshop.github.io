    <line x1="20" y1="150" x2="20" y2="175" stroke="#2c5f9e" stroke-width="1"/>
    <text x="20" y="188" text-anchor="middle" font-size="10" fill="#2c5f9e">PET</text>
    <line x1="65" y1="150" x2="65" y2="175" stroke="#88b4cc" stroke-width="1"/>
    <text x="65" y="188" text-anchor="middle" font-size="10" fill="#4a8aa5">壓克力</text>
    <line x1="98" y1="150" x2="98" y2="175" stroke="#999" stroke-width="1"/>
    <text x="98" y="188" text-anchor="middle" font-size="10" fill="#666">鏡面膜</text>
