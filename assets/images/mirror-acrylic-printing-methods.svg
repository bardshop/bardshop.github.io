  <rect x="260" y="140" width="24" height="150" rx="3" fill="url(#mirror)" stroke="#999" stroke-width="1.5"/>
  <line x1="268" y1="145" x2="268" y2="285" stroke="#ddd" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="276" y1="145" x2="276" y2="285" stroke="#eee" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="272" y="302" text-anchor="middle" font-size="13" font-weight="600" fill="#666">鏡面膜</text>
  <text x="340" y="220" text-anchor="middle" font-size="28" fill="#999">+</text>
  <rect x="380" y="140" width="50" height="150" rx="4" fill="url(#acrylic)" stroke="#88b4cc" stroke-width="1.5"/>
