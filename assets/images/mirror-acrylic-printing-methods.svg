  <text x="400" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#fff">PET 彩白 ＋ 鏡面膜 ＋ 壓克力</text>
  <rect x="120" y="140" width="40" height="150" rx="4" fill="url(#pet)" stroke="#2c5f9e" stroke-width="1.5"/>
  <text x="140" y="200" text-anchor="middle" font-size="11" fill="#fff" transform="rotate(-90 140 200)">印刷 彩+白</text>
  <text x="140" y="302" text-anchor="middle" font-size="13" font-weight="600" fill="#2c5f9e">PET</text>
